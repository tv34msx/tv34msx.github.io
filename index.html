<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Телевизор 34 — Альбомные иконки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e14;
    --panel: #121620;
    --panel-2: #1a1f2c;
    --line: #232938;
    --text: #eceef2;
    --muted: #7d8492;
    --accent: #ffb13d;
    --live: #ff5d5d;
    --fav: #ffc107;
  }

  * { box-sizing: border-box; }
  body, html {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background-color: var(--bg); color: var(--text);
    font-family: 'Inter', system-ui, sans-serif; overflow: hidden;
  }

  /* СТИЛИ ФОКУСА ДЛЯ ПУЛЬТА */
  .focusable {
    border: 3px solid transparent !important;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    outline: none !important;
  }
  
  .focusable:focus, .focusable.tv-highlight {
    border-color: var(--accent) !important;
    transform: scale(1.06);
    background-color: var(--panel-2) !important;
    box-shadow: 0 0 20px rgba(255, 177, 61, 0.3) !important;
    z-index: 10;
  }

  .hidden { display: none !important; }

  /* ШАПКА */
  .main-screen { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 25px 40px; }
  
  .nav-bar { 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    margin-bottom: 25px; 
    gap: 20px;
    flex-wrap: nowrap;
  }
  
  .nav-left { 
    display: flex; 
    align-items: center; 
    gap: 25px; 
    min-width: 0;
  }
  
  .logo-area { 
    font-family: 'Space Mono', monospace; 
    font-weight: 700; 
    font-size: 24px; 
    flex-shrink: 0;
  }
  .logo-area span { color: var(--accent); }
  
  .tabs-row { 
    display: flex; 
    gap: 8px; 
    flex-shrink: 1; 
    min-width: 0;
    overflow: hidden;
  }
  
  .tab-btn {
    background: transparent; border: none; color: var(--muted);
    font-size: 15px; font-weight: 600; padding: 8px 14px; border-radius: 8px;
    white-space: nowrap;
  }
  .tab-btn.active { color: var(--text); background: var(--panel); border-bottom: 3px solid var(--accent); }
  
  .nav-right { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    flex-shrink: 0;
  }

  .search-box {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 12px; color: var(--text); font-size: 14px; width: 160px;
    transition: width 0.2s; font-family: inherit;
  }
  .search-box:focus { border-color: var(--accent); width: 220px; }

  .time-clock { font-weight: 700; font-family: 'Space Mono', monospace; font-size: 18px; min-width: 55px; }

  /* КОНТЕНТ */
  .content-view { flex: 1; display: flex; flex-direction: column; gap: 15px; min-height: 0; }
  .section-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px;}
  .section-label { font-size: 18px; font-weight: 600; color: var(--muted); }
  
  .grid-container { display: flex; gap: 20px; overflow-x: auto; padding: 10px 5px 20px 5px; scroll-behavior: smooth; }
  
  /* УБРАЛИ КАНТЫ И ВНУТРЕННИЕ ОТСТУПЫ, ЧТОБЫ КАРТИНКА СЕЛА НА ВСЮ КНОПКУ */
  .channel-card, .category-card {
    width: 210px; height: 130px; border-radius: 14px; display: flex; flex-direction: column;
    position: relative; flex-shrink: 0; overflow: hidden;
    box-shadow: 0 8px 16px rgba(0,0,0,0.4); background: var(--panel); padding: 0;
  }
  
  /* РАСТЯГИВАЕМ КОНТЕЙНЕР НА ВСЮ КАРТОЧКУ */
  .card-logo-box { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  
  /* ЭФФЕКТ СЛИЯНИЯ: ТЕПЕРЬ ОБЛОЖКА ЗАПОЛНЯЕТ ВСЁ ПРОСТРАНСТВО БЕЗ ИСКАЖЕНИЙ */
  .card-logo-box img { width: 100%; height: 100%; object-fit: cover; }
  
  .card-fallback { font-family: 'Space Mono', monospace; font-size: 20px; color: #fff; text-align: center; padding: 10px; }
  
  /* СТИЛЬНАЯ ПЛАШКА С НАЗВАНИЕМ ПОВЕРХ КАРТИНКИ СНИЗУ */
  .card-title-bar {
    position: absolute; bottom: 0; left: 0; width: 100%;
    background: linear-gradient(0deg, rgba(11,14,20,0.95) 0%, rgba(11,14,20,0.6) 70%, rgba(11,14,20,0) 100%);
    padding: 25px 10px 8px 10px; font-size: 12px; font-weight: 600;
    text-overflow: ellipsis; overflow: hidden; white-space: nowrap; text-align: center;
    z-index: 4;
  }
  
  /* СМЕСТИЛИ НОМЕР И ЗВЕЗДУ, ЧТОБЫ ОНИ КРАСИВО СМОТРЕЛИСЬ ПОВЕРХ ФОНА */
  .card-num { 
    position: absolute; top: 10px; left: 12px; font-size: 11px; 
    color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    font-family: 'Space Mono', monospace; z-index: 5;
  }
  
  .fav-star {
    position: absolute; top: 8px; right: 12px; font-size: 18px; color: rgba(255,255,255,0.4);
    transition: color 0.2s; cursor: pointer; z-index: 5; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .fav-star.is-fav { color: var(--fav) !important; text-shadow: 0 0 8px rgba(255, 193, 7, 0.8); }

  /* EPG / О НАС */
  .epg-container { display: flex; gap: 25px; height: 100%; min-height: 0; }
  .epg-sidebar { width: 30%; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-right: 5px; }
  .epg-ch-item { background: var(--panel); padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 10px; text-align: left; width: 100%; border: 3px solid transparent; color: inherit; }
  .epg-main-list { width: 70%; background: var(--panel); border-radius: 14px; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .epg-row { display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.02); }
  .epg-row.current-live { border-left: 4px solid var(--accent); background: rgba(255, 177, 61, 0.05); }
  .epg-time { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--accent); min-width: 55px; }
  .epg-text { font-size: 15px; font-weight: 500; }

  .about-box {
    display: flex; align-items: center; background: var(--panel); border-radius: 16px;
    padding: 35px; gap: 40px; max-width: 850px; margin: 30px auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid var(--line);
  }
  .about-qr-frame { width: 170px; height: auto; background: #fff; padding: 8px; border-radius: 12px; flex-shrink: 0; }
  .about-qr-frame img { width: 100%; height: auto; display: block; }
  .about-text-side { display: flex; flex-direction: column; gap: 10px; }
  .about-title { font-size: 28px; font-weight: 700; color: var(--accent); margin: 0; }
  .about-desc { font-size: 16px; line-height: 1.5; color: var(--text); margin: 0; }

  /* ПЛЕЕР */
  .player-screen { position: relative; width: 100vw; height: 100vh; background: #000; }
  .full-media-container { position: absolute; inset: 0; z-index: 1; }
  video, iframe { width: 100%; height: 100%; border: none; background: #000; }
  
  video::-webkit-media-controls-start-playback-button,
  video::-webkit-media-controls-play-button,
  video::-webkit-media-controls-panel {
    display: none !important;
    -webkit-appearance: none;
  }

  .osd-overlay {
    position: absolute; bottom: 0; left: 0; width: 100%;
    background: linear-gradient(0deg, rgba(10,13,20,0.95) 0%, rgba(10,13,20,0.85) 70%, rgba(10,13,20,0) 100%);
    padding: 50px 50px 40px 50px; z-index: 2; display: flex; align-items: center; justify-content: space-between; gap: 30px; transition: opacity 0.3s ease;
  }
  .osd-left { display: flex; align-items: center; gap: 15px; }
  .osd-channel-number { font-family: 'Space Mono', monospace; font-size: 30px; font-weight: 700; color: var(--accent); }
  .osd-logo-box { width: 90px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 5px; }
  .osd-logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .osd-center { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .osd-ch-name { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: 700; }
  .osd-program-title { font-size: 22px; font-weight: 600; color: #fff; }
  .osd-timeline-row { display: flex; align-items: center; gap: 15px; }
  .osd-progress-bg { flex: 1; height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; }
  .osd-progress-bar { height: 100%; background: var(--accent); width: 0%; }
  .osd-right { display: flex; align-items: center; }
  .osd-clock { font-family: 'Space Mono', monospace; font-size: 34px; font-weight: 700; color: #fff; }
  .loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); font-size: 18px; color: var(--accent); font-family: 'Space Mono', monospace; z-index: 3; }
</style>
</head>
<body>

  <div id="view-main" class="main-screen">
    <header class="nav-bar">
      <div class="nav-left">
        <div class="logo-area">ТЕЛЕВИЗОР <span>34</span></div>
        <div class="tabs-row" id="tabs-container">
          <button class="tab-btn active focusable" data-tab="all" tabIndex="0" onclick="switchTab('all')">Каналы</button>
          <button class="tab-btn focusable" data-tab="categories" tabIndex="0" onclick="switchTab('categories')">Категории</button>
          <button class="tab-btn focusable" data-tab="epg" tabIndex="0" onclick="switchTab('epg')">Телепрограмма</button>
          <button class="tab-btn focusable" data-tab="about" tabIndex="0" onclick="switchTab('about')">О нас</button>
        </div>
      </div>
      <div class="nav-right">
        <input type="text" id="searchInp" class="search-box focusable" placeholder="Поиск..." tabIndex="0" oninput="handleSearch()">
        <div class="time-clock" id="clock">00:00</div>
      </div>
    </header>

    <div id="tab-content-all" class="content-view">
      <div class="section-header-row">
        <div id="sectionTitle" class="section-label">Загрузка...</div>
        <div style="font-size: 11px; color: var(--muted);">[F] — Избранное</div>
      </div>
      <div class="grid-container" id="main-carousel"></div>
    </div>

    <div id="tab-content-categories" class="content-view hidden">
      <div class="section-label">Жанры</div>
      <div class="grid-container" id="categories-carousel"></div>
    </div>

    <div id="tab-content-epg" class="content-view hidden">
      <div class="epg-container">
        <div class="epg-sidebar" id="epg-channels-list"></div>
        <div class="epg-main-list" id="epg-schedule-list">
          <div style="color:var(--muted); text-align:center; margin-top:40px;">Выберите канал слева</div>
        </div>
      </div>
    </div>

    <div id="tab-content-about" class="content-view hidden">
      <div class="about-box">
        <div class="about-qr-frame">
          <img src="https://televizor34.onrender.com/qr_max.png" alt="QR">
        </div>
        <div class="about-text-side">
          <div class="about-title">Наш Макс</div>
          <div class="about-desc">
            Подпишитесь на наш канал в Максе! Этим вы поддержите проект и будете получать новости.
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="view-player" class="player-screen hidden">
    <div class="full-media-container">
      <video id="tv-video" playsinline></video>
      <iframe id="embedFrame" class="hidden" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
    <div id="video-loading" class="loading-overlay hidden">Подключение...</div>

    <div id="osdMenu" class="osd-overlay">
      <div class="osd-left">
        <div class="osd-channel-number" id="osdNum">001</div>
        <div class="osd-logo-box" id="osdLogo"></div>
      </div>
      <div class="osd-center">
        <div class="osd-ch-name" id="osdChannelName">КАНАЛ</div>
        <div class="osd-program-title" id="osdTitle">Загрузка...</div>
        <div class="osd-timeline-row">
          <span class="osd-time-stamp" id="osdTimeStart">00:00</span>
          <div class="osd-progress-bg">
            <div class="osd-progress-bar" id="osdProgressBar"></div>
          </div>
          <span class="osd-time-stamp" id="osdTimeEnd">00:00</span>
        </div>
      </div>
      <div class="osd-right">
        <div class="osd-clock" id="osdClock">00:00</div>
      </div>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<script>
  const PLAYLIST_URL = 'https://raw.githubusercontent.com/iboxestvoff/televizor34_serverfiles/main/playlist.m3u';
  const EPG_URL = 'https://raw.githubusercontent.com/iboxestvoff/televizor34_serverfiles/main/epg/epg.xml';
  
  let allChannels = [];
  let filteredChannels = [];
  let categories = {};
  let epgDatabase = {};
  let favorites = JSON.parse(localStorage.getItem('tv34_favs')) || [];
  
  let currentTab = 'all';
  let hlsInstance = null;
  let currentScreen = 'main';
  let playerIndex = 0;
  let osdTimeout = null;

  function parseXmltvDate(dateStr) {
    if (!dateStr) return new Date();
    const y = dateStr.substring(0, 4);
    const m = parseInt(dateStr.substring(4, 6)) - 1;
    const d = dateStr.substring(6, 8);
    const h = dateStr.substring(8, 10);
    const min = dateStr.substring(10, 12);
    const s = dateStr.substring(12, 14) || "00";
    return new Date(y, m, d, h, min, s);
  }

  function formatTime(date) {
    return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
  }

  async function loadEpg() {
    try {
      const res = await fetch(EPG_URL);
      if (!res.ok) throw new Error(`Ошибка загрузки EPG: ${res.status}`);
      const text = await res.text();
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(text, "text/xml");
      
      const channelNodes = xmlDoc.getElementsByTagName("channel");
      const channelMap = {};
      for (let node of channelNodes) {
        const id = node.getAttribute("id");
        const displayName = node.getElementsByTagName("display-name")[0]?.textContent?.trim()?.toLowerCase();
        if (id && displayName) channelMap[id] = displayName;
      }

      const programmeNodes = xmlDoc.getElementsByTagName("programme");
      for (let node of programmeNodes) {
        const channelId = node.getAttribute("channel");
        const channelName = channelMap[channelId] || channelId?.toLowerCase();
        if (!channelName) continue;

        const start = parseXmltvDate(node.getAttribute("start"));
        const stop = parseXmltvDate(node.getAttribute("stop"));
        const title = node.getElementsByTagName("title")[0]?.textContent || "Передача";

        if (!epgDatabase[channelName]) epgDatabase[channelName] = [];
        epgDatabase[channelName].push({ start, stop, title });
      }
    } catch (e) {
      console.error("EPG Error:", e);
    }
  }

  function parseM3U(text) {
    const lines = text.split(/\r?\n/);
    const result = [];
    let pending = null;
    
    categories = {};
    for (let raw of lines) {
      const line = raw.trim();
      if (!line) continue;
      if (line.startsWith('#EXTINF')) {
        const logoMatch = line.match(/tvg-logo="([^"]*)"/);
        const nameMatch = line.match(/,(.*)$/);
        const groupMatch = line.match(/group-title="([^"]*)"/);
        
        pending = {
          logo: logoMatch ? logoMatch[1] : null,
          name: nameMatch ? nameMatch[1].trim() : 'Канал',
          group: groupMatch ? groupMatch[1].trim() : 'Другие'
        };
      } else if (!line.startsWith('#') && pending) {
        pending.url = line;
        result.push(pending);
        if (!categories[pending.group]) categories[pending.group] = [];
        categories[pending.group].push(pending);
        pending = null;
      }
    }
    return result;
  }

  function getCurrentProgram(channelName) {
    const list = epgDatabase[channelName?.toLowerCase()];
    if (!list) return null;
    const now = new Date();
    return list.find(p => now >= p.start && now <= p.stop) || null;
  }

  async function initApp() {
    await loadEpg();
    try {
      const res = await fetch(PLAYLIST_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Ошибка загрузки плейлиста: ${res.status}`);
      const text = await res.text();
      allChannels = parseM3U(text);
      filteredChannels = [...allChannels];
      sortChannelsByFav();
      renderAllChannels();
      renderCategories();
      renderEpgSidebar();
      
      setTimeout(() => {
        const firstTab = document.querySelector('.tab-btn.active');
        if(firstTab) firstTab.focus();
      }, 300);
    } catch (e) {
      document.getElementById('sectionTitle').innerText = "Ошибка сети (Плейлист не найден)";
      console.error(e);
    }
  }

  function sortChannelsByFav() {
    filteredChannels.sort((a, b) => {
      const aFav = favorites.includes(a.name) ? 1 : 0;
      const bFav = favorites.includes(b.name) ? 1 : 0;
      return bFav - aFav; 
    });
  }

  function toggleFavorite(name) {
    const idx = favorites.indexOf(name);
    if (idx > -1) favorites.splice(idx, 1);
    else favorites.push(name);
    localStorage.setItem('tv34_favs', JSON.stringify(favorites));
    const activeElId = document.activeElement ? document.activeElement.getAttribute('data-name') : null;
    sortChannelsByFav();
    renderAllChannels();
    if (activeElId) {
      const target = document.querySelector(`[data-name="${activeElId}"]`);
      if(target) target.focus();
    }
  }

  function handleSearch() {
    const query = document.getElementById('searchInp').value.toLowerCase().trim();
    filteredChannels = query ? allChannels.filter(ch => ch.name.toLowerCase().includes(query)) : [...allChannels];
    sortChannelsByFav();
    renderAllChannels();
  }

  function renderAllChannels() {
    const container = document.getElementById('main-carousel');
    document.getElementById('sectionTitle').innerText = `Телеканалы (${filteredChannels.length})`;
    container.innerHTML = filteredChannels.map((ch, idx) => `
      <div class="focusable channel-card" tabIndex="0" data-name="${ch.name}" data-type="channel" data-idx="${idx}" onclick="openPlayerView(${idx})">
        <div class="fav-star ${favorites.includes(ch.name) ? 'is-fav' : ''}" onclick="event.stopPropagation(); toggleFavorite('${ch.name}')">★</div>
        <div class="card-num">${String(idx + 1).padStart(3, '0')}</div>
        <div class="card-logo-box">
          ${ch.logo ? `<img src="${ch.logo}">` : `<div class="card-fallback">${ch.name.substring(0,3)}</div>`}
        </div>
        <div class="card-title-bar">${ch.name}</div>
      </div>
    `).join('');
  }

  function renderCategories() {
    const container = document.getElementById('categories-carousel');
    container.innerHTML = Object.keys(categories).map(catName => `
      <div class="focusable category-card" tabIndex="0" data-type="category" onclick="selectCategory('${catName}')">
        <div class="card-fallback" style="font-size:16px; color:var(--accent); text-align:center;">${catName}</div>
        <div style="font-size:11px; color:var(--muted); margin-top:5px; text-align:center; width:100%;">${categories[catName].length} кан.</div>
      </div>
    `).join('');
  }

  function selectCategory(catName) {
    filteredChannels = categories[catName];
    sortChannelsByFav();
    renderAllChannels();
    switchTab('all');
  }

  function renderEpgSidebar() {
    const sidebar = document.getElementById('epg-channels-list');
    sidebar.innerHTML = allChannels.map((ch, idx) => `
      <button class="focusable epg-ch-item" tabIndex="0" data-type="epg-ch" data-idx="${idx}" onclick="showRealEpg(${idx})">
        <div style="font-family: 'Space Mono', monospace; color:var(--accent); font-size:12px;">${String(idx+1).padStart(3,'0')}</div>
        <div style="font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${ch.name}</div>
      </button>
    `).join('');
  }

  function showRealEpg(idx) {
    const ch = allChannels[idx];
    const container = document.getElementById('epg-schedule-list');
    const list = epgDatabase[ch.name.toLowerCase()] || [];
    const now = new Date();
    if (list.length === 0) {
      container.innerHTML = `<div style="color:var(--muted); text-align:center; margin-top:40px;">Нет программы для "${ch.name}"</div>`;
      return;
    }
    container.innerHTML = `
      <div style="display:flex; align-items:center; gap:15px; margin-bottom:10px; border-bottom:1px solid var(--line); padding-bottom:10px;">
        <div style="font-size:18px; font-weight:700; color:var(--accent);">${ch.name}</div>
        <button class="focusable" tabIndex="0" style="background:var(--accent); border:none; color:#000; padding:6px 12px; font-weight:700; border-radius:6px; font-size:12px;" onclick="launchFromEpg('${ch.name}')">СМОТРЕТЬ</button>
      </div>
      ${list.map(p => {
        const isLive = now >= p.start && now <= p.stop;
        return `
          <div class="epg-row ${isLive ? 'current-live' : ''}">
            <div class="epg-time">${formatTime(p.start)}</div>
            <div class="epg-text">${p.title} ${isLive ? '<span style="color:var(--live); font-size:10px; margin-left:8px;">● LIVE</span>' : ''}</div>
          </div>
        `;
      }).join('')}
    `;
  }

  function launchFromEpg(name) {
    const idx = filteredChannels.findIndex(c => c.name === name);
    if(idx > -1) openPlayerView(idx);
  }

  function switchTab(tabId) {
    currentTab = tabId;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
    document.getElementById('tab-content-all').classList.add('hidden');
    document.getElementById('tab-content-categories').classList.add('hidden');
    document.getElementById('tab-content-epg').classList.add('hidden');
    document.getElementById('tab-content-about').classList.add('hidden');
    document.getElementById(`tab-content-${tabId}`).classList.remove('hidden');
  }

  function openPlayerView(idx) {
    currentScreen = 'player';
    playerIndex = idx;
    document.getElementById('view-main').classList.add('hidden');
    document.getElementById('view-player').classList.remove('hidden');
    startChannel(idx);
  }

  function closePlayerView() {
    currentScreen = 'main';
    if(hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    const v = document.getElementById('tv-video');
    v.pause(); v.removeAttribute('src'); v.load();
    document.getElementById('embedFrame').src = 'about:blank';
    document.getElementById('view-player').classList.add('hidden');
    document.getElementById('view-main').classList.remove('hidden');
    setTimeout(() => {
      const card = document.querySelector(`[data-idx="${playerIndex}"][data-type="channel"]`);
      if(card) card.focus();
    }, 50);
  }

  function startChannel(idx) {
    const ch = filteredChannels[idx];
    if(!ch) return;
    document.getElementById('osdNum').innerText = String(idx + 1).padStart(3, '0');
    document.getElementById('osdChannelName').innerText = ch.name;
    document.getElementById('osdLogo').innerHTML = ch.logo ? `<img src="${ch.logo}">` : `<span>${ch.name.substring(0,2)}</span>`;
    updateOsdProgData(ch);
    showOSD();
    const v = document.getElementById('tv-video');
    const f = document.getElementById('embedFrame');
    const l = document.getElementById('video-loading');
    l.classList.remove('hidden');
    v.classList.add('hidden');
    f.classList.add('hidden');
    
    if (/(^|\.)vk(video)?\.(com|ru)\/(video_ext\.php|video-)/i.test(ch.url) || ch.url.includes('rutube.ru')) {
      l.classList.add('hidden');
      f.classList.remove('hidden');
      let u = ch.url;
      const r = ch.url.match(/rutube\.ru\/(?:play\/embed\/|video\/)([a-z0-9]+)/i);
      if (r) u = 'https://rutube.ru/play/embed/' + r[1] + '/';
      f.src = u;
      return;
    }
    
    v.classList.remove('hidden');
    if (Hls.isSupported()) {
      if(hlsInstance) hlsInstance.destroy();
      hlsInstance = new Hls();
      hlsInstance.loadSource(ch.url);
      hlsInstance.attachMedia(v);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { l.classList.add('hidden'); v.play().catch(()=>{}); });
    } else {
      v.src = ch.url;
      v.addEventListener('loadedmetadata', () => { l.classList.add('hidden'); v.play().catch(()=>{}); }, { once: true });
    }
  }

  function updateOsdProgData(ch) {
    const p = getCurrentProgram(ch.name);
    const t = document.getElementById('osdTitle');
    const s = document.getElementById('osdTimeStart');
    const e = document.getElementById('osdTimeEnd');
    const b = document.getElementById('osdProgressBar');
    if (p) {
      t.innerText = p.title;
      s.innerText = formatTime(p.start);
      e.innerText = formatTime(p.stop);
      const total = p.stop - p.start;
      const passed = new Date() - p.start;
      b.style.width = Math.min(Math.max((passed / total) * 100, 0), 100) + '%';
    } else {
      t.innerText = "Прямой эфир"; s.innerText = "--:--"; e.innerText = "--:--"; b.style.width = '0%';
    }
  }

  function showOSD() {
    const o = document.getElementById('osdMenu');
    o.style.opacity = '1';
    clearTimeout(osdTimeout);
    osdTimeout = setTimeout(() => o.style.opacity = '0', 5000);
  }

  // ОБРАБОТКА ДВИЖЕНИЯ ПУЛЬТА И АВТОСКРОЛЛА КОНТЕЙНЕРОВ
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' || e.key === 'Backspace') {
      e.preventDefault();
      if (currentScreen === 'player') closePlayerView();
      return;
    }
    if (currentScreen === 'player') {
      showOSD();
      if (e.key === 'ArrowUp' || e.key === 'ArrowRight') { if (playerIndex < filteredChannels.length - 1) { playerIndex++; startChannel(playerIndex); } }
      else if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') { if (playerIndex > 0) { playerIndex--; startChannel(playerIndex); } }
      return;
    }
    const a = document.activeElement;
    if (!a || !a.classList.contains('focusable')) return;
    if (e.key.toLowerCase() === 'f' || e.key === 'а') {
      const n = a.getAttribute('data-name');
      if (n && a.getAttribute('data-type') === 'channel') toggleFavorite(n);
    }
    let nxt = null;
    if (e.key === 'ArrowRight') { nxt = a.nextElementSibling; if (!nxt && a.classList.contains('tab-btn')) nxt = document.getElementById('searchInp'); } 
    else if (e.key === 'ArrowLeft') { nxt = a.previousElementSibling; if (!nxt && a.id === 'searchInp') nxt = document.querySelector('.tab-btn:last-child'); } 
    else if (e.key === 'ArrowDown') {
      if (a.classList.contains('tab-btn') || a.id === 'searchInp') {
        if (currentTab === 'all') nxt = document.querySelector('#main-carousel .focusable');
        else if (currentTab === 'categories') nxt = document.querySelector('#categories-carousel .focusable');
        else if (currentTab === 'epg') nxt = document.querySelector('#epg-channels-list .focusable');
      }
    } else if (e.key === 'ArrowUp') {
      if (a.getAttribute('data-type') === 'channel' || a.getAttribute('data-type') === 'category' || a.getAttribute('data-type') === 'epg-ch') nxt = document.querySelector('.tab-btn.active');
    }
    if (nxt && nxt.classList.contains('focusable')) { 
      e.preventDefault(); 
      nxt.focus(); 
      
      const p = nxt.parentElement;
      if (p && (p.id === 'main-carousel' || p.id === 'categories-carousel')) {
        p.scrollTo({
          left: nxt.offsetLeft - p.offsetWidth / 2 + nxt.offsetWidth / 2,
          behavior: 'smooth'
        });
      }
    }
  });

  setInterval(() => {
    const d = new Date();
    const t = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    document.getElementById('clock').innerText = t;
    document.getElementById('osdClock').innerText = t;
    if (currentScreen === 'player' && filteredChannels[playerIndex]) updateOsdProgData(filteredChannels[playerIndex]);
  }, 1000);

  initApp();
</script>
</body>
